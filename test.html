<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Off - Get it on Google Play</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
      /* Define color palettes using CSS variables */
      :root {
        --bg-start: #f5f5f7;
        --bg-end: #e5e5ea;
        --text-color-start: #111111;
        --text-color-end: #333333;
        --shadow-color: rgba(0, 0, 0, 0.1);
        --glow-color: rgba(0, 0, 0, 0.02);
        --theme-color: #f5f5f7;
      }

      /* Automatic switch to dark mode based on system settings */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-start: #121212;
          --bg-end: #1a1a1a;
          --text-color-start: #ffffff;
          --text-color-end: #e0e0e0;
          --shadow-color: rgba(0, 0, 0, 0.5);
          --glow-color: rgba(255, 255, 255, 0.05);
          --theme-color: #121212;
        }
      }

      /* Reset and base styles */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start; /* Changed from center to push content up */
        align-items: center;
        padding: 2rem;
        padding-top: 20vh; /* Adds a clean gap at the top of the viewport */
        transition: background 0.3s ease;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      /* Container with a modern asymmetric row layout */
      .card {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 2rem;
        max-width: 550px;
        width: 100%;
        padding: 2.5rem;
        background: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(10px);
        border-radius: 32px;
        box-shadow: 0 20px 40px var(--shadow-color);
        animation: fadeIn 0.8s ease-out;
      }

      /* Logo styles with micro-interactions and dynamic shadows */
      #logo {
        width: 100px;
        height: 100px;
        border-radius: 22px;
        box-shadow: 0 10px 30px var(--shadow-color), 0 0 20px var(--glow-color);
        flex-shrink: 0;
        transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.2s ease;
      }

      /* Slight lift on hover */
      #logo:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 35px var(--shadow-color), 0 0 25px var(--glow-color);
      }

      /* Tactile 'press down' effect when clicked */
      #logo:active {
        transform: scale(0.92) translateY(0);
        box-shadow: 0 4px 15px var(--shadow-color), 0 0 10px var(--glow-color);
      }

      /* Left-aligned content section */
      .content {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        text-align: left;
      }

      h1 {
        color: var(--text-color-start);
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      p {
        color: var(--text-color-end);
        font-size: 1rem;
        line-height: 1.5;
        margin-bottom: 1rem; /* Margins narrowed to fit tighter badge */
      }

      /* Optimized badge rules to counter huge native transparent margins */
      .badge-link {
        display: inline-block;
        text-decoration: none;
        overflow: hidden;
      }
      
      .badge-link:hover {
        transform: scale(1.03);
      }

      .badge-link:active {
        transform: scale(0.98);
      }
      

      .badge-img {
        height: 60px; /* Reduced layout height */
        display: block;
        justify-content: center;
        align-items: center;
        margin: -10px; /* Trims native transparent padding of Google's image asset */
      }

      /* Responsive adjustment for small mobile viewports */
      @media (max-width: 480px) {
        .card {
          flex-direction: column;
          align-items: flex-start;
          gap: 1.5rem;
          padding: 1.5rem;
        }
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>

    <div class="card">
      <!-- App Icon/Logo -->
      <img id="logo" src="ic_launcher-web.png" alt="Screen Off Logo">
      
      <!-- Left-Aligned Texts and Button -->
      <div class="content">
        <h1>Screen Off</h1>
        <p>Turn off your screen instantly with a single tap. Protect your hardware power button.</p>
        <a class="badge-link" href="https://play.google.com/store/apps/details?id=nl.matthijsvh.screenoff&pcampaignid=pcampaignidMKT-Other-global-all-co-prtnr-py-PartBadge-Mar2515-1" target="_blank">
          <img class="badge-img" src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play">
        </a>
      </div>
    </div>

  </body>
</html>
