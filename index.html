<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Off - Get it on Google Play</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
      /* Define color palettes using CSS variables */
      :root {
        --bg-start: #f5f5f7;
        --bg-end: #e5e5ea;
        --text-color-start: #111111;
        --text-color-end: #333333;
        --shadow-color: rgba(0, 0, 0, 0.1);
        --glow-color: rgba(0, 0, 0, 0.02);
        --theme-color: #f5f5f7;
      }

      /* Automatic switch to dark mode based on system settings */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-start: #121212;
          --bg-end: #1a1a1a;
          --text-color-start: #ffffff;
          --text-color-end: #e0e0e0;
          --shadow-color: rgba(0, 0, 0, 0.5);
          --glow-color: rgba(255, 255, 255, 0.05);
          --theme-color: #121212;
        }
      }

      /* Apply dynamic theme color to browser UI */
      meta[name="theme-color"] {
        content: var(--theme-color);
      }

      /* Reset and base styles */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 2rem;
        overflow: hidden;
        transition: background 0.3s ease;
      }

      /* Container for structure */
      .card {
        text-align: center;
        max-width: 400px;
        width: 100%;
        animation: fadeIn 0.8s ease-out;
      }

      /* Logo styles with dynamic shadows */
      #logo {
        width: 120px;
        height: 120px;
        border-radius: 24px;
        box-shadow: 0 10px 30px var(--shadow-color), 0 0 20px var(--glow-color);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      #logo:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px var(--shadow-color), 0 0 30px var(--glow-color);
      }

      /* Typography with dynamic gradient */
      h1 {
        font-family: 'Google Sans Display', 'Roboto', 'Arial', sans-serif;
        font-size: 2.5rem;
        font-weight: 500;
        letter-spacing: -0.5px;
        margin: 1.5rem 0 2.5rem 0;
        background: linear-gradient(to bottom, var(--text-color-start), var(--text-color-end));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Play Store Badge wrapper */
      .badge-link {
        display: inline-block;
        transition: transform 0.2s ease;
      }

      .badge-link:hover {
        transform: scale(1.03);
      }

      .badge-link:active {
        transform: scale(0.98);
      }

      .badge-link img {
        height: 60px;
        width: auto;
      }

      /* Entry animation */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="ic_launcher-web.png" alt="Screen Off Logo" id="logo">
      <h1>Screen Off</h1>
      <a class="badge-link" href="https://play.google.com/store/apps/details?id=nl.matthijsvh.screenoff&pcampaignid=pcampaignidMKT-Other-global-all-co-prtnr-py-PartBadge-Mar2515-1">
        <img alt="Get it on Google Play" src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png">
      </a>
    </div>
  </body>
</html>
